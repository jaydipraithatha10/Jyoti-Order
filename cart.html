
<!DOCTYPE html>
<html lang="gu">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shopping Cart | Jyoti Gruh Udhyog</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f6f0e8;
padding-bottom:180px;
}

header{
background:#5b3716;
color:#fff;
padding:18px;
display:flex;
align-items:center;
gap:15px;
position:sticky;
top:0;
z-index:999;
}

header a{
color:#fff;
text-decoration:none;
font-size:28px;
}

header h1{
font-size:24px;
}

.container{
padding:15px;
}

.cart-item{
background:#fff;
border-radius:18px;
padding:15px;
margin-bottom:15px;
box-shadow:0 4px 12px rgba(0,0,0,.12);
}

.cart-item h3{
color:#5b3716;
margin-bottom:8px;
}

.cart-item p{
color:#666;
margin:4px 0;
}

.cart-bottom{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:15px;
}

.qty{
display:flex;
align-items:center;
gap:10px;
}

.qty button{
width:36px;
height:36px;
border:none;
border-radius:50%;
background:#b8860b;
color:#fff;
font-size:22px;
cursor:pointer;
}

.qty span{
font-size:20px;
font-weight:bold;
min-width:22px;
text-align:center;
}

.removeBtn{
background:#d9534f;
color:#fff;
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
}

.summary{
position:fixed;
left:0;
right:0;
bottom:0;
background:#5b3716;
color:#fff;
padding:18px;
}

.summary h2{
margin-bottom:8px;
}

.summary p{
font-size:18px;
margin:5px 0;
}

</style>

</head>

<body>

<header>

<a href="index.html">⬅</a>

<h1>🛒 Shopping Cart</h1>

</header>

<div class="container" id="cartItems">

</div>

<div class="summary">

<h2>Order Summary</h2>

<p>Total Items : <span id="totalItems">0</span></p>

<p>Total Amount : ₹<span id="totalAmount">0</span></p>

</div>

<script src="cart.js"></script>

<script>
