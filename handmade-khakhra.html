<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hand Made Khakhra | Jyoti Gruh Udhyog</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f8f3ea;
padding-bottom:110px;
}

header{
position:sticky;
top:0;
background:#5b3716;
color:#fff;
padding:15px;
display:flex;
align-items:center;
gap:15px;
z-index:999;
box-shadow:0 2px 10px rgba(0,0,0,.2);
}

.back{
font-size:28px;
text-decoration:none;
color:#fff;
}

header h1{
font-size:24px;
}

.hero img{
width:100%;
display:block;
}

.hero-text{
background:#fff8ef;
padding:18px;
text-align:center;
}

.hero-text h2{
color:#b8860b;
margin-bottom:8px;
}

.hero-text p{
color:#666;
}

.products{
padding:15px;
}

.product{
background:#fff;
border-radius:18px;
padding:18px;
margin-bottom:15px;
box-shadow:0 4px 12px rgba(0,0,0,.12);
}

.product img{
width:100%;
border-radius:12px;
margin-bottom:12px;
}

.product h3{
color:#5b3716;
margin-bottom:12px;
}

.bottom{
display:flex;
justify-content:space-between;
align-items:center;
}

.price span{
display:block;
color:#777;
font-size:15px;
}

.price h4{
font-size:28px;
color:#b8860b;
margin-top:5px;
}

.qty{
display:flex;
align-items:center;
gap:10px;
}

.qty button{
width:38px;
height:38px;
border:none;
border-radius:50%;
background:#b8860b;
color:#fff;
font-size:22px;
cursor:pointer;
}

.qty span{
font-size:20px;
font-weight:bold;
min-width:22px;
text-align:center;
}

#cartBar{
position:fixed;
left:0;
right:0;
bottom:0;
background:#5b3716;
color:#fff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

#cartBar button{
background:#25D366;
border:none;
color:#fff;
padding:12px 18px;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<a href="khakhra.html" class="back">⬅</a>

<h1>🥨 Hand Made Khakhra</h1>

</header>

<section class="hero">

<img src="plain.png">

<div class="hero-text">

<h2>પોચા • સ્વાદિષ્ટ • Hand Made</h2>

<p>દરેક કોળિયામાં ઘરનો અસલી સ્વાદ ❤️</p>

</div>

</section>

<div id="products" class="products">

</div>

<div id="cartBar">

<div>

<script>

const products = [
{
name:"Naylon Sada Khakhra",
price:150,
weight:"500 gm",
image:"plain.png"
},
{
name:"Naylon Methi Khakhra",
price:150,
weight:"500 gm",
image:"methi.png"
},
{
name:"Naylon Masala Khakhra",
price:150,
weight:"500 gm",
image:"masala.png"
},
{
name:"Naylon Jeera Khakhra",
price:150,
weight:"500 gm",
image:"jeera.png"
},
{
name:"Bajara Methi Khakhra",
price:180,
weight:"500 gm",
image:"bajara.png"
},
{
name:"Juwar Khakhra",
price:180,
weight:"500 gm",
image:"juwar.png"
},
{
name:"Kothmir Marcha Khakhra",
price:180,
weight:"500 gm",
image:"kothmir.png"
}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const productsDiv = document.getElementById("products");

function getQty(name){
const item = cart.find(p=>p.name===name);
return item ? item.qty : 0;
}

function renderProducts(){

productsDiv.innerHTML="";

products.forEach((p,index)=>{

productsDiv.innerHTML+=`

<div class="product">

<img src="${p.image}" alt="${p.name}">

<h3>${p.name}</h3>

<div class="bottom">

<div class="price">

<span>${p.weight}</span>

<h4>₹${p.price}</h4>

</div>

<div class="qty">

<button onclick="changeQty(${index},-1)">−</button>

<span>${getQty(p.name)}</span>

<button onclick="changeQty(${index},1)">+</button>

</div>

</div>

</div>

`;

});

}function saveCart() {
    localStorage.setItem("cart", JSON.stringify(cart));
}

function getTotalItems() {
    return cart.reduce((total, item) => total + item.qty, 0);
}

function getTotalAmount() {
    return cart.reduce((total, item) => total + (item.qty * item.price), 0);
}

function updateCart() {
    document.getElementById("cartCount").textContent = getTotalItems();
    document.getElementById("cartTotal").textContent = getTotalAmount();
    saveCart();
}

function changeQty(index, value) {

    const product = products[index];
    const existing = cart.find(item => item.name === product.name);

    if (value === 1) {

        if (existing) {
            existing.qty++;
        } else {
            cart.push({
                name: product.name,
                price: product.price,
                weight: product.weight,
                image: product.image,
                qty: 1
            });
        }

    } else {

        if (existing) {
            existing.qty--;

            if (existing.qty <= 0) {
                cart = cart.filter(item => item.name !== product.name);
            }
        }

    }

    updateCart();
    renderProducts();
}

document.getElementById("orderBtn").addEventListener("click", function () {

    if (cart.length === 0) {
        alert("કૃપા કરીને ઓછામાં ઓછો એક Product પસંદ કરો.");
        return;
    }

    window.location.href = "cart.html";

});

renderProducts();
updateCart();

</script>

</body>
</html>

</script>
🛒 <span id="cartCount">0</span> Items

</div>

<div>

₹ <span id="cartTotal">0</span>

</div>

<button id="orderBtn">

Order

</button>

</div>
