<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Products</title>

    <link rel="stylesheet" href="product.css">

</head>

<body>

    <!-- Header -->

    <header class="header">

        <button class="back-btn" onclick="history.back()">
            ←
        </button>

        <h2>Products</h2>

        <div class="cart-icon">

            🛒 <span id="cartCount">0</span>

        </div>

    </header>

    <!-- Products -->

    <main>

        <section id="productGrid" class="product-grid">

            <!-- Products Load Here -->

        </section>

    </main>

    <!-- Bottom Order Bar -->

    <div id="bottomBar" class="bottom-bar">

        <div class="order-info">

            <h3 id="itemCount">0 Items</h3>

            <p>₹<span id="grandTotal">0</span></p>

        </div>

        <button id="orderBtn" onclick="orderNow()">

            🛍️ Order Now

        </button>

    </div>

    <script src="product.js"></script>

</body>

</html>
