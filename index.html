<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Jyoti Gruh Udhyog | Rajkot</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<style>

/* CSS Part 1 પછી અહીં આવશે */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#173629;
color:#fff;
}

.container{
max-width:500px;
margin:auto;
}

header{
text-align:center;
padding:25px 15px;
background:#2B1D12;
}

.logo{
width:90px;
height:90px;
border-radius:50%;
border:4px solid #D4A017;
background:#fff;
}

header h1{
margin-top:15px;
font-size:28px;
color:#D4A017;
font-weight:700;
}

header p{
margin-top:5px;
font-size:17px;
color:#fff;
}

.our-products{
text-align:center;
padding:25px 10px 10px;
}

.our-products h2{
font-size:26px;
color:#D4A017;
}

.search-box{
padding:15px;
}

.search-box input{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:16px;
outline:none;
}

.category-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:15px;
}
.category-card{
background:#2B1D12;
border:2px solid #D4A017;
border-radius:20px;
padding:20px;
text-align:center;
cursor:pointer;
transition:0.3s;
box-shadow:0 5px 15px rgba(0,0,0,0.25);
}

.category-card:hover{
transform:translateY(-5px);
box-shadow:0 8px 20px rgba(212,160,23,0.4);
}

.category-card img{
width:90px;
height:90px;
object-fit:cover;
border-radius:15px;
margin-bottom:12px;
border:2px solid #D4A017;
}

.category-card h3{
font-size:20px;
color:#D4A017;
margin-top:5px;
}

#products{
padding:15px;
}

.footer-content{
text-align:center;
padding:35px 20px;
background:#2B1D12;
margin-top:30px;
}

.footer-logo{
width:70px;
margin-bottom:10px;
}

.footer-content h2{
color:#D4A017;
margin-bottom:5px;
}

.footer-content p{
color:#ddd;
margin:4px 0;
}

.whatsapp-btn{
display:inline-block;
margin-top:18px;
padding:12px 22px;
background:#25D366;
color:#fff;
text-decoration:none;
border-radius:10px;
}

/* ===== Premium Category Effect ===== */

.category-card{
background:linear-gradient(180deg,#3A2618,#2B1D12);
}

.category-card:active{
transform:scale(.97);
}

.category-card img{
transition:.3s;
}

.category-card:hover img{
transform:scale(1.08);
}

.category-card:hover h3{
color:#FFD700;
}

.search-box input{
background:#fff;
color:#222;
border:2px solid #D4A017;
}

.search-box input::placeholder{
color:#777;
}

.search-box input:focus{
border-color:#FFD700;
box-shadow:0 0 12px rgba(255,215,0,.4);
}

.title,
.our-products h2{
letter-spacing:1px;
text-transform:uppercase;
}

@media(max-width:480px){

.logo{
width:80px;
height:80px;
}

header h1{
font-size:23px;
}

.category-card{
padding:15px;
}

.category-card img{
width:75px;
height:75px;
}

.category-card h3{
font-size:17px;
}

.whatsapp-btn{
width:100%;
display:block;
}

}

html{
scroll-behavior:smooth;
}
</style>

</head>

<body>

<div class="container">

<header>

<img src="logo.png"
class="logo">

<h1>JYOTI GRUH UDHYOG</h1>

<p>Rajkot</p>

</header>

<section class="our-products">

<h2>OUR PRODUCTS</h2>

</section>

<div class="search-box">

<input
type="text"
id="search"
placeholder="Search Products...">

</div>

<div class="category-grid">

<div class="category-card"
onclick="openCategory('Khakhra')">

<img src="images/khakhra.jpg">

<h3>Khakhra</h3>

</div>

<div class="category-card"
onclick="openCategory('Pickles')">

<img src="images/pickles.jpg">

<h3>Pickles</h3>

</div>

<div class="category-card"
onclick="openCategory('Dry Fruits')">

<img src="images/dryfruits.jpg">

<h3>Dry Fruits</h3>

</div>

<div class="category-card"
onclick="openCategory('Namkeen')">

<img src="images/namkeen.jpg">

<h3>Namkeen</h3>

</div>

<div class="category-card"
onclick="openCategory('Bakery')">

<img src="images/bakery.jpg">

<h3>Bakery</h3>

</div>

<div class="category-card"
onclick="openCategory('Others')">

<img src="images/others.jpg">

<h3>Others</h3>

</div>

</div>

<div id="products"></div>
<footer>

<div class="footer-content">

<img src="logo.png" class="footer-logo">

<h2>Jyoti Gruh Udhyog</h2>

<p>Rajkot</p>

<p>Premium Homemade Products</p>

<a href="https://wa.me/919712149344" class="whatsapp-btn">
<i class="fa-brands fa-whatsapp"></i>
Order on WhatsApp
</a>

</div>

</footer>

</div>

<script>

/* JavaScript Part પછી અહીં આવશે */

function openCategory(category){

    if(category=="Khakhra"){
        window.location.href="khakhra.html";
    }

    else if(category=="Pickles"){
        window.location.href="pickles.html";
    }

    else if(category=="Dry Fruits"){
        window.location.href="dryfruits.html";
    }

    else if(category=="Namkeen"){
        window.location.href="namkeen.html";
    }

    else if(category=="Bakery"){
        window.location.href="bakery.html";
    }

    else if(category=="Others"){
        window.location.href="others.html";
    }

}
</script>

</body>

</html>
