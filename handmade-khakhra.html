<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hand Made Khakhra | Jyoti Gruh Udhyog</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f8f5ef;
}
.header{
background:#5c3714;
color:white;
padding:18px;
text-align:center;
}

.header h1{
font-size:28px;
}

.banner img{
width:100%;
display:block;
}

.slogan{
background:#fff4dd;
color:#7a4d00;
padding:15px;
text-align:center;
font-size:18px;
font-weight:bold;
line-height:1.6;
}

.container{
padding:15px;
}
.product{
    display:flex;
    flex-direction:column;
    gap:10px;
    background:#fff;
    border-radius:20px;
    padding:18px 20px;
    margin-bottom:18px;
    box-shadow:0 6px 18px rgba(0,0,0,.08);
}

.right{
    display:flex;
    justify-content:flex-end;
    align-items:center;
    gap:18px;
}

.left h3{
    font-size:18px;
    font-weight:700;
    line-height:1.4;
    margin-bottom:6px;
}

.weight{
    font-size:16px;
    color:#666;
}

.price{
    font-size:28px;
    font-weight:700;
    color:#b22222;
}
.add-btn{
    width:95px;
    height:48px;
    border:none;
    border-radius:30px;
    background:#c79a00;
    color:#fff;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
    transition:.2s;
}

.add-btn:hover{
    transform:scale(1.05);
}

.badge{
    display:inline-block;
    padding:3px 8px;
    border-radius:15px;
    font-size:10px;
    margin-left:8px;
    vertical-align:middle;
}
.best{
    background:#fff3cd;
    color:#b8860b;
}

.healthy{
    background:#d4edda;
    color:#1b7f3a;
}
.bottom-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:8px;
}
</style>

</head>

<body>

<div class="header">
    <h1>🥨 Hand Made Khakhra</h1>
</div>

<div class="banner">
    <img src="plain.png" alt="Hand Made Khakhra">
</div>

<div class="slogan">
    હાથે બનાવેલા • પોચા • સ્વાદિષ્ટ<br>
    દરેક કોળિયામાં ઘરનો અસલી સ્વાદ ❤️
</div>

<div class="container">




<div class="product">

    <h3>Naylon Sada Khakhra</h3>

    <div class="bottom-row">

        <span class="weight">500 gm</span>

        <div class="right">
            <span class="price">₹150</span>
            <button class="add-btn">Add</button>
        </div>

    </div>

</div>




</div>






</body>

</html>
