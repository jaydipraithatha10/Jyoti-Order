<script>
const products = [

/* Plain Khakhra */

{id:"MM001",name:"Methi Khakhra",price:60,weight:"250 gm",section:"plain"},
{id:"MM002",name:"Masala Khakhra",price:60,weight:"250 gm",section:"plain"},

{id:"MM008",name:"Mag Khakhra",price:75,weight:"250 gm",section:"plain"},
{id:"MM009",name:"Math Khakhra",price:75,weight:"250 gm",section:"plain"},
{id:"MM010",name:"Jav Khakhra",price:75,weight:"250 gm",section:"plain"},
{id:"MM011",name:"Juwar Khakhra",price:75,weight:"250 gm",section:"plain"},
{id:"MM012",name:"Ragi Khakhra",price:75,weight:"250 gm",section:"plain"},
{id:"MM013",name:"Kashmiri Marcha Khakhra",price:70,weight:"250 gm",section:"plain"},
{id:"MM014",name:"Chorafali Khakhra",price:75,weight:"250 gm",section:"plain"},
{id:"MM015",name:"Aachar Masala Khakhra",price:75,weight:"250 gm",section:"plain"},
{id:"MM016",name:"Sing Daniya Khakhra",price:70,weight:"250 gm",section:"plain"},
{id:"MM017",name:"Jeera Mari Khakhra",price:70,weight:"250 gm",section:"plain"},
{id:"MM018",name:"Hing Jeera Khakhra",price:75,weight:"250 gm",section:"plain"},

/* Flavour Khakhra */

{id:"MM019",name:"Pani Puri Khakhra",price:75,weight:"250 gm",section:"flavour"},
{id:"MM020",name:"Chat Masala Khakhra",price:75,weight:"250 gm",section:"flavour"},
{id:"MM021",name:"Maggi Masala Khakhra",price:75,weight:"250 gm",section:"flavour"},
{id:"MM022",name:"Katkate Khakhra",price:75,weight:"250 gm",section:"flavour"},
{id:"MM023",name:"Pav Bhaji Khakhra",price:75,weight:"250 gm",section:"flavour"},
{id:"MM024",name:"Jeeralu Khakhra",price:75,weight:"250 gm",section:"flavour"},
{id:"MM025",name:"Pizza Khakhra",price:85,weight:"250 gm",section:"flavour"},
{id:"MM026",name:"Cheese Khakhra",price:85,weight:"250 gm",section:"flavour"},
{id:"MM027",name:"Peri Peri Khakhra",price:85,weight:"250 gm",section:"flavour"},
{id:"MM028",name:"Tomato Khakhra",price:85,weight:"250 gm",section:"flavour"},
{id:"MM029",name:"Cream & Onion Khakhra",price:90,weight:"250 gm",section:"flavour"},
{id:"MM030",name:"Manchurian Khakhra",price:85,weight:"250 gm",{id:"MM031",name:"Cheese Chilli Khakhra",price:90,weight:"250 gm",section:"flavour"},
{id:"MM032",name:"Multi Grain Khakhra",price:90,weight:"250 gm",section:"flavour"},
{id:"MM033",name:"Ghee Khakhra",price:120,weight:"250 gm",section:"flavour"}

];

const plainContainer = document.getElementById("plainProducts");
const flavourContainer = document.getElementById("flavourProducts");

function renderProducts(){:"flavour"},

function renderProducts(){

    plainContainer.innerHTML="";
    flavourContainer.innerHTML="";

    products.forEach((p,index)=>{

        const html=`

        <div class="product">

            <h3>${p.name}</h3>

            <div class="bottom">

                <div>
                    <span>${p.weight}</span>
                    <h4>₹${p.price}</h4>
                </div>

                <div class="qty">

                    <button onclick="changeQty(${index},-1)">−</button>

                    <span>${getQty(p.id)}</span>

                    <button onclick="changeQty(${index},1)">+</button>

                </div>

            </div>

        </div>
        `;

        if(p.section==="plain"){
            plainContainer.innerHTML+=html;
        }else{
            flavourContainer.innerHTML+=html;
        }

    });

}

function changeQty(index,value){

    if(value>0){

        addToCart(
            products[index].id,
            products[index].name,
            products[index].price,
            products[index].weight
        );

    }else{

        removeFromCart(products[index].id);

    }

    updateCart();
    renderProducts();

}

function updateCart(){

    document.getElementById("cartCount").textContent=getTotalItems();

    document.getElementById("cartTotal").textContent=getTotalAmount();

}
function sendWhatsApp(){

    if(cart.length===0){
        alert("કૃપા કરીને ઓછામાં ઓછો એક Product પસંદ કરો.");
        return;
    }

    let msg="નમસ્તે, મને નીચે મુજબ ઓર્ડર કરવો છે.\n\n";

    cart.forEach(item=>{
        msg+=`${item.name} (${item.weight}) x ${item.qty} = ₹${item.qty*item.price}\n`;
    });

    msg+="\nકુલ રકમ : ₹"+getTotalAmount();

    window.open(
        "https://wa.me/919712149344?text="+encodeURIComponent(msg),
        "_blank"
    );

    clearCart();

    updateCart();
    renderProducts();

}

renderProducts();
updateCart();

</script>
