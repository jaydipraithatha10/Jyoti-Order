<!DOCTYPE html>
<html lang="gu">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jyoti Gruh Udhyog</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Loader -->

<div id="loader">
    <div class="spinner"></div>
</div>

<!-- Header -->

<header class="header">

    <img src="logo.png" class="logo" alt="Jyoti Gruh Udhyog Logo">

    <h1>Jyoti Gruh Udhyog</h1>

    <p>Premium Farsan • Khakhra • Pickle • Snacks</p>

</header>

<!-- Search -->

<div class="search-box">

<input
type="text"
id="search"
placeholder="અહીં Category શોધો..."
onkeyup="searchCategory()">

</div>

<!-- Categories -->

<section>

<div id="categoryGrid" class="category-grid">

<!-- Categories Google Sheetમાંથી અહીં Auto Load થશે -->

</div>

</section>

<!-- Floating Cart -->

<div class="cart-bar">

<div>

🛒 <span id="cartCount">0</span>

</div>

<div id="cartTotal">

₹0

</div>

<button onclick="window.location.href='cart.html'">

View Cart

</button>

</div>

<script src="script.js"></script>

</body>
</html>
