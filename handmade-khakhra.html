<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hand Made Khakhra | Jyoti Gruh Udhyog</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f6f0e8;
padding-bottom:120px;
}

.topbar{
background:#5b3716;
color:#fff;
padding:15px;
display:flex;
align-items:center;
gap:15px;
position:sticky;
top:0;
z-index:999;
}

.back-btn{
color:#fff;
text-decoration:none;
font-size:28px;
}

.topbar h1{
font-size:24px;
}

.hero img{
width:100%;
display:block;
}

.hero-text{
background:#fff8ef;
padding:20px;
text-align:center;
}

.hero-text h2{
color:#8b5a00;
margin-bottom:10px;
}

.hero-text p{
color:#555;
}

.products{
padding:15px;
}

.product{
background:#fff;
border-radius:18px;
padding:18px;
margin-bottom:15px;
box-shadow:0 4px 12px rgba(0,0,0,.12);
}

.product h3{
color:#5b3716;
margin-bottom:15px;
}

.bottom{
display:flex;
justify-content:space-between;
align-items:center;
}

.bottom span{
color:#777;
}

.bottom h4{
margin-top:5px;
font-size:28px;
color:#b8860b;
}

.qty{
display:flex;
align-items:center;
gap:10px;
}

.qty button{
width:38px;
height:38px;
border:none;
border-radius:50%;
background:#b8860b;
color:#fff;
font-size:22px;
cursor:pointer;
}

.qty span{
font-size:20px;
font-weight:bold;
min-width:22px;
text-align:center;
}

#cartBar{
position:fixed;
left:0;
right:0;
bottom:0;
background:#5b3716;
color:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
}

#cartBar button{
background:#25D366;
color:#fff;
border:none;
padding:12px 18px;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<header class="topbar">

<a href="khakhra.html" class="back-btn">⬅</a>

<h1>🥨 Hand Made Khakhra</h1>

</header>

<section class="hero">

<img src="plain.png">

<div class="hero-text">

<h2>પોચા • સ્વાદિષ્ટ • Hand Made</h2>

<p>દરેક કોળિયામાં ઘરનો અસલી સ્વાદ ❤️</p>

</div>

</section>

<div id="products" class="products"></div>

<div id="cartBar">

<div>
🛒 <span id="cartCount">0</span> Items
</div>

<div>
₹ <span id="cartTotal">0</span>
</div>

<button onclick="sendWhatsApp()">
Order
</button>

</div>

<script src="cart.js"></script>

<script>

const products = [
{id:"HM001",name:"Naylon Sada Khakhra",price:150,weight:"500 gm"},
{id:"HM002",name:"Naylon Methi Khakhra",price:150,weight:"500 gm"},
{id:"HM003",name:"Naylon Masala Khakhra",price:150,weight:"500 gm"},
{id:"HM004",name:"Naylon Jeera Khakhra",price:150,weight:"500 gm"},
{id:"HM005",name:"Bajara Methi Khakhra",price:180,weight:"500 gm"},
{id:"HM006",name:"Juwar Khakhra",price:180,weight:"500 gm"},
{id:"HM007",name:"Kothmir Marcha Khakhra",price:180,weight:"500 gm"}
];
const productsDiv = document.getElementById("products");

function getQty(id){
    const item = cart.find(p => p.id === id);
    return item ? item.qty : 0;
}

function renderProducts(){

    productsDiv.innerHTML = "";

    products.forEach((p,index)=>{

        productsDiv.innerHTML += `
        <div class="product">

            <h3>${p.name}</h3>

            <div class="bottom">

                <div>
                    <span>${p.weight}</span>
                    <h4>₹${p.price}</h4>
                </div>

                <div class="qty">

                    <button onclick="changeQty(${index},-1)">−</button>

<span>${getQty(p.id)}</span>

<button onclick="changeQty(${index},1)">+</button>

                </div>

            </div>

        </div>`;
    });

}

function changeQty(index,value){

    if(value > 0){

        addToCart(
            products[index].id,
            products[index].name,
            products[index].price,
            products[index].weight
        );

    }else{

        removeFromCart(products[index].id);

    }

    updateCart();
    renderProducts();

}
function updateCart(){

    document.getElementById("cartCount").textContent = getTotalItems();

    document.getElementById("cartTotal").textContent = getTotalAmount();

}

function sendWhatsApp(){

    if(cart.length === 0){
        alert("કૃપા કરીને ઓછામાં ઓછો એક Product પસંદ કરો.");
        return;
    }

    let msg = "નમસ્તે, મને નીચે મુજબ ઓર્ડર કરવો છે.\n\n";

    cart.forEach(item=>{
        msg += `${item.name} (${item.weight}) x ${item.qty} = ₹${item.qty * item.price}\n`;
    });

    msg += "\nકુલ રકમ : ₹" + getTotalAmount();

    window.open(
        "https://wa.me/919712149344?text=" + encodeURIComponent(msg),
        "_blank"
    );

    clearCart();

    updateCart();
    renderProducts();
}

renderProducts();
updateCart();
</script>

</body>
</html>
