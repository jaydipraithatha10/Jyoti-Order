<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>

    <link rel="stylesheet" href="cart.css">
</head>
<body>

<header class="header">

    <button class="back-btn" onclick="history.back()">⬅</button>

    <h2>Shopping Cart</h2>

</header>

<main>

    <div id="cartContainer">

        <!-- Cart Items Here -->

    </div>

    <div class="total-box">

        <h3>Total : ₹<span id="grandTotal">0</span></h3>

    </div>

    <div class="buttons">

        <button class="clear-btn" onclick="clearCart()">
            Clear Cart
        </button>

        <button class="order-btn" onclick="sendWhatsAppOrder()">
            Order on WhatsApp
        </button>

    </div>

</main>

<script src="cart.js"></script>

</body>
</html>
