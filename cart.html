<!DOCTYPE html>
<html lang="gu">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Cart | Jyoti Gruh Udhyog</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f8f3ea;
padding-bottom:120px;
}

header{
position:sticky;
top:0;
background:#5b3716;
color:#fff;
padding:15px;
display:flex;
align-items:center;
gap:15px;
box-shadow:0 2px 10px rgba(0,0,0,.2);
z-index:999;
}

.back{
text-decoration:none;
color:#fff;
font-size:28px;
}

header h1{
font-size:24px;
}

.container{
padding:15px;
}

.cart-item{
background:#fff;
border-radius:18px;
padding:15px;
margin-bottom:15px;
box-shadow:0 4px 12px rgba(0,0,0,.12);
}

.cart-item img{
width:90px;
height:90px;
object-fit:cover;
border-radius:12px;
float:left;
margin-right:15px;
}

.cart-item h3{
color:#5b3716;
margin-bottom:6px;
}

.cart-item p{
color:#666;
margin-bottom:6px;
}

.price{
font-size:24px;
font-weight:bold;
color:#b8860b;
margin-top:5px;
}

.qty{
display:flex;
align-items:center;
gap:10px;
margin-top:12px;
}

.qty button{
width:38px;
height:38px;
border:none;
border-radius:50%;
background:#b8860b;
color:#fff;
font-size:22px;
cursor:pointer;
}

.qty span{
font-size:20px;
font-weight:bold;
min-width:25px;
text-align:center;
}

.summary{
background:#fff;
padding:20px;
margin:15px;
border-radius:18px;
box-shadow:0 4px 12px rgba(0,0,0,.12);
}

.summary h2{
color:#5b3716;
margin-bottom:10px;
}

.total{
font-size:30px;
font-weight:bold;
color:#b8860b;
}

.bottomBar{
position:fixed;
left:0;
right:0;
bottom:0;
background:#5b3716;
padding:15px;
display:flex;
gap:10px;
}

.bottomBar button{
flex:1;
border:none;
padding:14px;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.shopBtn{
background:#ffffff;
color:#5b3716;
}

.nextBtn{
background:#25D366;
color:#fff;
}

.empty{
text-align:center;
padding:60px 20px;
color:#666;
font-size:22px;
}

</style>

</head>

<body>

<header>

<a href="handmade-khakhra.html" class="back">⬅</a>

<h1>🛒 My Cart</h1>

</header>

<div class="container" id="cartContainer">

</div>

<div class="summary">

<h2>Total Amount</h2>

<div class="total">
₹ <span id="grandTotal">0</span>
</div>

</div>

<div class="bottomBar">

<button class="shopBtn" onclick="history.back()">
Continue Shopping
</button>

<button class="nextBtn" id="nextBtn">
Customer Details
</button>

</div>
<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const cartContainer = document.getElementById("cartContainer");
const grandTotal = document.getElementById("grandTotal");

function saveCart(){
    localStorage.setItem("cart", JSON.stringify(cart));
}

function getTotal(){
    return cart.reduce((total,item)=>total + (item.price * item.qty),0);
}

function renderCart(){

    cartContainer.innerHTML = "";

    if(cart.length === 0){

        cartContainer.innerHTML = `
        <div class="empty">
            🛒<br><br>
            તમારું Cart ખાલી છે.
        </div>`;

        grandTotal.textContent = "0";
        return;
    }

    cart.forEach((item,index)=>{

        cartContainer.innerHTML += `

        <div class="cart-item">

            <img src="${item.image || 'plain.png'}">

            <h3>${item.name}</h3>

            <p>${item.weight}</p>

            <div class="price">₹${item.price}</div>

            <div class="qty">

                <button onclick="changeQty(${index},-1)">−</button>

                <span>${item.qty}</span>

                <button onclick="changeQty(${index},1)">+</button>

                <button onclick="removeItem(${index})">🗑️</button>

            </div>

        </div>

        `;

    });

    grandTotal.textContent = getTotal();

}

function changeQty(index,value){

    cart[index].qty += value;

    if(cart[index].qty <= 0){
        cart.splice(index,1);
    }

    saveCart();
    renderCart();

}

function removeItem(index){

    cart.splice(index,1);

    saveCart();

    renderCart();

}

renderCart();

document.getElementById("nextBtn").addEventListener("click",function(){

    if(cart.length===0){

        alert("કૃપા કરીને પહેલા Product ઉમેરો.");

        return;

    }

    saveCart();

    window.location.href="customer.html";

});

window.addEventListener("storage",function(){

    cart=JSON.parse(localStorage.getItem("cart"))||[];

    renderCart();

});

</script>

</body>
</html>
</script>
