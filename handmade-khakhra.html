<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hand Made Khakhra | Jyoti Gruh Udhyog</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#3b2417;
color:#fff;
}

header{
background:linear-gradient(135deg,#2b170d,#5b3716);
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid gold;
position:sticky;
top:0;
z-index:999;
}

.logo{
font-size:28px;
font-weight:bold;
color:#FFD700;
}

.cart{
background:#FFD700;
color:#3b2417;
padding:10px 18px;
border-radius:30px;
font-weight:bold;
cursor:pointer;
}

.back{
display:inline-block;
margin:20px;
text-decoration:none;
color:#FFD700;
font-size:18px;
}

.page-title{
text-align:center;
font-size:34px;
color:#FFD700;
margin-bottom:5px;
}

.subtitle{
text-align:center;
color:#f7dca0;
margin-bottom:30px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(270px,1fr));
gap:25px;
padding:20px;
max-width:1200px;
margin:auto;
}

.product-card{
background:#fff;
color:#333;
border-radius:20px;
padding:22px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,.25);
transition:.3s;
border:2px solid #E3C15A;
}

.product-card:hover{
transform:translateY(-8px);
}

.badge{
display:inline-block;
background:#FFD700;
color:#4b2e1e;
padding:6px 14px;
border-radius:30px;
font-size:13px;
font-weight:bold;
margin-bottom:15px;
}

.product-card h3{
color:#5B3716;
margin-bottom:12px;
}

.weight{
color:#666;
margin-bottom:8px;
}

.price{
font-size:30px;
font-weight:bold;
color:#198754;
margin:15px 0;
}

.cart-btn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#25D366,#128C7E);
color:#fff;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.cart-btn:hover{
transform:scale(1.03);
}

</style>
</head>

<body>

<header>

<div class="logo">
🥨 Hand Made Khakhra
</div>

<div class="cart">
🛒 Cart (<span id="count">0</span>)
</div>

</header>

<a href="khakhra.html" class="back">⬅ Back</a>

<h1 class="page-title">
Hand Made Khakhra
</h1>

<p class="subtitle">
Fresh • Traditional • Premium Quality
</p>

<div class="products">

<div class="product-card">

<div class="badge">🖐 Hand Made</div>

<h3>Naylon Sada Khakhra</h3>

<p class="weight">500 gm</p>

<div class="price">₹150</div>

<button class="cart-btn">🛒 Add to Cart</button>

</div>

<div class="product-card">

<div class="badge">🖐 Hand Made</div>

<h3>Naylon Masala Khakhra</h3>

<p class="weight">500 gm</p>

<div class="price">₹150</div>

<button class="cart-btn">🛒 Add to Cart</button>

</div>

<div class="product-card">

<div class="badge">🖐 Hand Made</div>

<h3>Naylon Methi Khakhra</h3>

<p class="weight">500 gm</p>

<div class="price">₹150</div>

<button class="cart-btn">🛒 Add to Cart</button>

</div>

<div class="product-card">

<div class="badge">🖐 Hand Made</div>

<h3>Naylon Jeera Khakhra</h3>

<p class="weight">500 gm</p>

<div class="price">₹150</div>

<button class="cart-btn">🛒 Add to Cart</button>

</div>

</div>

<!-- Part 2 માં JavaScript આવશે -->

<script>

let cartCount = 0;

const buttons = document.querySelectorAll(".cart-btn");

buttons.forEach(button => {

button.addEventListener("click", function(){

cartCount++;

document.getElementById("count").innerText = cartCount;

button.innerHTML = "✅ Added";

button.style.background = "#198754";

setTimeout(function(){

button.innerHTML = "🛒 Add to Cart";

button.style.background = "linear-gradient(90deg,#25D366,#128C7E)";

},1000);

});

});

</script>

</body>
</html>
</body>
</html>
