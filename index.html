<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>જ્યોતિ ગૃહ ઉદ્યોગ</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(180deg,#3b2415,#4b2d16,#2b1708);
color:#FFD700;
text-align:center;
min-height:100vh;
}

.header{
padding:50px 20px 30px;
}

.logo{
font-size:80px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{
filter:drop-shadow(0 0 5px gold);
}
to{
filter:drop-shadow(0 0 20px gold);
}
}

h1{
font-size:48px;
margin-top:10px;
}

.tagline{
font-size:22px;
margin-top:20px;
color:#FFE8A3;
}

.city{
font-size:30px;
margin-top:25px;
font-weight:bold;
}

.gold-line{
width:160px;
height:4px;
margin:25px auto;
border-radius:10px;
background:linear-gradient(to right,#8a5a00,#FFD700,#8a5a00);
}

.welcome{
width:90%;
max-width:500px;
margin:30px auto;
padding:25px;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,215,0,.4);
border-radius:20px;
backdrop-filter:blur(10px);
}

.welcome h2{
font-size:28px;
margin-bottom:15px;
}

.welcome p{
font-size:18px;
line-height:1.7;
color:#FFF5D6;
}

</style>

</head>

<body>

<div class="header">

<div class="logo">
🪔
</div>

<h1>
જ્યોતિ ગૃહ ઉદ્યોગ
</h1>

<div class="tagline">
સ્વાદ અને પરંપરાનો અતૂટ વારસો
</div>

<div class="city">
📍 રાજકોટ
</div>

<div class="gold-line"></div>

</div>

<div class="welcome">

<h2>
🙏 આપનું હાર્દિક સ્વાગત છે
</h2>

<p>
તમારી મનપસંદ પ્રોડક્ટ પસંદ કરો અને સરળતાથી
WhatsApp અથવા Call દ્વારા ઓર્ડર કરો.
</p>

</div>

</body>

</html>
