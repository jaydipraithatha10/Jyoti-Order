<!DOCTYPE html>
<html lang="gu">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hand Made Khakhra | Jyoti Gruh Udhyog</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f8f3ea;
padding-bottom:100px;
}

header{
position:sticky;
top:0;
background:#5b3716;
color:#fff;
padding:15px;
display:flex;
align-items:center;
gap:15px;
z-index:999;
box-shadow:0 2px 8px rgba(0,0,0,.2);
}

.back{
color:#fff;
text-decoration:none;
font-size:28px;
}

header h1{
font-size:24px;
}

.hero{
background:#fff8ef;
padding:20px;
text-align:center;
border-bottom:1px solid #eee;
}

.hero h2{
color:#b8860b;
margin-bottom:8px;
}

.hero p{
color:#666;
font-size:16px;
}

.products{
padding:15px;
}

.product{
background:#fff;
border-radius:16px;
padding:18px;
margin-bottom:15px;
box-shadow:0 4px 10px rgba(0,0,0,.10);
}

.product h3{
font-size:22px;
color:#5b3716;
margin-bottom:10px;
}

.weight{
color:#666;
font-size:15px;
margin-bottom:8px;
}

.price{
font-size:28px;
font-weight:bold;
color:#b8860b;
margin-bottom:15px;
}

.qty{
display:flex;
justify-content:flex-end;
align-items:center;
gap:10px;
}

.qty button{
width:40px;
height:40px;
border:none;
border-radius:50%;
background:#b8860b;
color:#fff;
font-size:22px;
cursor:pointer;
}

.qty span{
font-size:20px;
font-weight:bold;
min-width:25px;
text-align:center;
}

#cartBar{
position:fixed;
left:0;
right:0;
bottom:0;
background:#5b3716;
color:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
}

#cartBar button{
background:#25D366;
color:#fff;
border:none;
padding:12px 18px;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<a href="khakhra.html" class="back">⬅</a>

<h1>Hand Made Khakhra</h1>

</header>

<section class="hero">

<img src="plain.png" alt="Hand Made Khakhra">

<div class="hero-text">

<h2>Hand Made Khakhra</h2>

<p>પોચા • સ્વાદિષ્ટ • ઘરનો અસલી સ્વાદ ❤️</p>

</div>

</section>

<div id="products" class="products"></div>

<div id="cartBar">

<div>
🛒 <span id="cartCount">0</span> Items
</div>

<div>
₹ <span id="cartTotal">0</span>
</div>

<button id="orderBtn">
Order
</button>

</div>
<script>

const products = [
{
name:"Naylon Sada Khakhra",
weight:"500 gm",
price:150
},
{
name:"Naylon Methi Khakhra",
weight:"500 gm",
price:150
},
{
name:"Naylon Masala Khakhra",
weight:"500 gm",
price:150
},
{
name:"Naylon Jeera Khakhra",
weight:"500 gm",
price:150
},
{
name:"Bajara Methi Khakhra",
weight:"500 gm",
price:180
},
{
name:"Juwar Khakhra",
weight:"500 gm",
price:180
},
{
name:"Kothmir Marcha Khakhra",
weight:"500 gm",
price:180
}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const productsDiv = document.getElementById("products");

function getQty(name){

const item = cart.find(p => p.name === name);

return item ? item.qty : 0;

}

function renderProducts(){

productsDiv.innerHTML = "";

products.forEach((product,index)=>{

productsDiv.innerHTML += `

<div class="product">

<h3>${product.name}</h3>

<div class="weight">${product.weight}</div>

<div class="price">₹${product.price}</div>

<div class="qty">

<button onclick="changeQty(${index},-1)">−</button>

<span>${getQty(product.name)}</span>

<button onclick="changeQty(${index},1)">+</button>

</div>

</div>

`;

});

}
function saveCart(){

    localStorage.setItem("cart", JSON.stringify(cart));

}

function getTotalItems(){

    return cart.reduce((total,item)=>total + item.qty,0);

}

function getTotalAmount(){

    return cart.reduce((total,item)=>total + (item.price * item.qty),0);

}

function updateCart(){

    document.getElementById("cartCount").textContent = getTotalItems();

    document.getElementById("cartTotal").textContent = getTotalAmount();

    saveCart();

}

function changeQty(index,value){

    const product = products[index];

    let item = cart.find(p => p.name === product.name);

    if(value === 1){

        if(item){

            item.qty++;

        }else{

            cart.push({
                name:product.name,
                weight:product.weight,
                price:product.price,
                qty:1
            });

        }

    }else{

        if(item){

            item.qty--;

            if(item.qty <= 0){

                cart = cart.filter(p => p.name !== product.name);

            }

        }

    }

    updateCart();

    renderProducts();

}
document.getElementById("orderBtn").addEventListener("click", function(){

    if(cart.length === 0){

        alert("કૃપા કરીને ઓછામાં ઓછો એક Product પસંદ કરો.");

        return;

    }

    saveCart();

    window.location.href = "cart.html";

});

window.addEventListener("storage", function(){

    cart = JSON.parse(localStorage.getItem("cart")) || [];

    renderProducts();

    updateCart();

});

renderProducts();

updateCart();

</script>

</body>
</html>
